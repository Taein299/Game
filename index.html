<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DEAD BY DAYLIGHT</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-touch-callout: none; }
        body { width: 100vw; height: 100vh; height: 100dvh; background-color: #000; overflow: hidden; font-family: sans-serif; display: flex; justify-content: center; align-items: center; touch-action: none; }

        #app { position: relative; width: 100%; height: 100%; max-width: 1000px; max-height: 600px; background: #111; overflow: hidden; box-shadow: 0 0 20px #000; }

        /* 제작자 표시 */
        .creator-info { position: absolute; top: 10px; right: 10px; color: rgba(255, 255, 255, 0.8); font-size: 14px; font-weight: bold; z-index: 1000; text-shadow: 1px 1px 2px #000; pointer-events: none; }

        /* 시작 화면 */
        #startScreen { position: absolute; width: 100%; height: 100%; background: linear-gradient(to bottom, #9bc1e6 0%, #d3e2f2 60%, #e9cbb5 100%); z-index: 100; display: flex; flex-direction: column; align-items: center; }
        .mountains-back { position: absolute; bottom: 0; width: 100%; height: 30%; background: #a9907a; opacity: 0.6; clip-path: polygon(0% 70%, 20% 50%, 40% 80%, 60% 40%, 80% 75%, 100% 50%, 100% 100%, 0% 100%); }
        .mountains { position: absolute; bottom: 0; width: 100%; height: 25%; background: #bfa38a; clip-path: polygon(0% 60%, 15% 40%, 30% 70%, 55% 30%, 75% 65%, 90% 45%, 100% 70%, 100% 100%, 0% 100%); }
        .title { margin-top: 12%; font-size: 7vh; font-weight: 900; color: #fff; text-shadow: 0 0 10px rgba(0,0,0,0.5), 2px 2px 0 #4a7199; z-index: 10; text-align: center; }
        .menu { position: absolute; top: 48%; display: flex; flex-direction: column; gap: 15px; z-index: 10; text-align: center; }
        .menu-item { font-size: 3.5vh; font-weight: bold; color: #333; cursor: pointer; text-shadow: 1px 1px 0 #fff; transition: 0.2s; padding: 5px 20px; }
        .menu-item:hover { color: #fff; transform: scale(1.1); text-shadow: 0 0 5px #000; }
        #snowCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }

        /* 게임 화면 */
        #gameScreen { position: absolute; width: 100%; height: 100%; display: none; background: #1a1a1a; }
        canvas { display: block; width: 100%; height: 100%; object-fit: contain; }
        
        /* 공포 연출 테두리 */
        #dangerBorder { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; box-shadow: inset 0 0 0px rgba(255, 0, 0, 0); transition: box-shadow 0.2s; z-index: 10; }
        
        /* UI */
        #uiLayer { position: absolute; top: 10px; left: 10px; color: #fff; font-size: 18px; z-index: 10; text-shadow: 1px 1px 2px #000; font-weight: bold; }

        /* 스태미나 바 */
        #staminaContainer { position: absolute; bottom: 20px; right: 20px; width: 140px; height: 14px; background: rgba(0, 0, 0, 0.6); border: 2px solid #fff; border-radius: 7px; z-index: 20; overflow: hidden; display: none; }
        #staminaBar { width: 100%; height: 100%; background: #00ff66; transition: width 0.05s linear; }

        /* 조이스틱 (모바일 최적화 크기) */
        #joystickZone { position: absolute; bottom: 20px; left: 20px; width: 110px; height: 110px; background: rgba(255, 255, 255, 0.1); border-radius: 50%; z-index: 20; display: none; touch-action: none; border: 2px solid rgba(255,255,255,0.25); }
        #joystickKnob { position: absolute; top: 50%; left: 50%; width: 44px; height: 44px; background: rgba(255, 255, 255, 0.45); border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 8px rgba(0,0,0,0.5); pointer-events: none; }
    </style>
</head>
<body>

<div id="app">
    <div class="creator-info">제작자: 김태인</div>

    <div id="startScreen">
        <canvas id="snowCanvas"></canvas>
        <div class="mountains-back"></div>
        <div class="mountains"></div>
        <div class="title">DEAD BY DAYLIGHT</div>
        <div class="menu">
            <div class="menu-item" id="btnStart">게임 시작</div>
            <div class="menu-item">설정</div>
            <div class="menu-item">종료</div>
        </div>
    </div>

    <div id="gameScreen">
        <div id="dangerBorder"></div>
        <div id="uiLayer">발전기 수리: <span id="uiCount">0</span> / 4</div>
        <div id="staminaContainer"><div id="staminaBar"></div></div>
        <canvas id="gameCanvas"></canvas>
        <div id="joystickZone"><div id="joystickKnob"></div></div>
    </div>
</div>

<script>
    const GAME_WIDTH = 1000;
    const GAME_HEIGHT = 600;
    const gameCanvas = document.getElementById('gameCanvas');
    const ctx = gameCanvas.getContext('2d');
    gameCanvas.width = GAME_WIDTH;
    gameCanvas.height = GAME_HEIGHT;

    // 오디오 설정
    const warningAudio = new Audio('aa.mp3');
    warningAudio.loop = true;
    warningAudio.preload = 'auto';
    warningAudio.volume = 0;

    // 모바일 스크롤 및 줌 기본 동작 강제 차단
    document.addEventListener('touchmove', (e) => { if(e.touches.length > 1) e.preventDefault(); }, { passive: false });

    // 시작화면 눈 효과
    const snowCanvas = document.getElementById('snowCanvas');
    const snowCtx = snowCanvas.getContext('2d');
    function resizeSnow() {
        snowCanvas.width = document.getElementById('startScreen').clientWidth;
        snowCanvas.height = document.getElementById('startScreen').clientHeight;
    }
    window.addEventListener('resize', resizeSnow);
    resizeSnow();

    const snowflakes = Array.from({length: 35}, () => ({
        x: Math.random() * snowCanvas.width, y: Math.random() * snowCanvas.height,
        r: Math.random() * 2 + 1, d: Math.random() * 1 + 0.5
    }));

    function drawSnow() {
        snowCtx.clearRect(0, 0, snowCanvas.width, snowCanvas.height);
        snowCtx.fillStyle = "rgba(255, 255, 255, 0.8)";
        snowCtx.beginPath();
        snowflakes.forEach(f => {
            snowCtx.moveTo(f.x, f.y);
            snowCtx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
            f.y += f.d; f.x += Math.sin(f.y / 50) * 0.5;
            if (f.y > snowCanvas.height) { f.y = 0; f.x = Math.random() * snowCanvas.width; }
        });
        snowCtx.fill();
    }

    // 게임 데이터
    let isRunning = false;
    let particles = [];
    const UI = { 
        count: document.getElementById('uiCount'), 
        border: document.getElementById('dangerBorder'),
        stamina: document.getElementById('staminaBar'),
        staminaBox: document.getElementById('staminaContainer')
    };
    let joyX = 0, joyY = 0; 

    const player = { 
        type: 'player', x: 100, y: 100, r: 15, 
        walkSpeed: 2.3, runSpeed: 4.5, speed: 2.3, 
        color: '#00ffcc', alive: true, angle: 0,
        stamina: 100, maxStamina: 100
    };
    
    const killer = { type: 'killer', x: GAME_WIDTH - 100, y: GAME_HEIGHT - 100, r: 18, speed: 2.8, color: '#ff0033', angle: 0 };
    
    const ais = Array.from({length: 3}, (_, i) => ({ type: 'ai', x: 200 + i*100, y: 150 + i*50, r: 15, speed: 2.6, color: '#00aaff', alive: true, targetGen: null, angle: 0 }));
    
    const generators = [
        { x: 150, y: 450, r: 30, progress: 0, done: false },
        { x: 500, y: 150, r: 30, progress: 0, done: false },
        { x: 800, y: 400, r: 30, progress: 0, done: false },
        { x: 500, y: 450, r: 30, progress: 0, done: false }
    ];
    const escapeGate = { x: GAME_WIDTH / 2 - 40, y: 10, w: 80, h: 20, active: false };

    const getDist = (a, b) => Math.hypot(b.x - a.x, b.y - a.y);
    const getAngle = (a, b) => Math.atan2(b.y - a.y, b.x - a.x);

    // 키보드 리스너
    const keys = {};
    window.addEventListener('keydown', e => keys[e.key] = true);
    window.addEventListener('keyup', e => keys[e.key] = false);

    // 모바일 조이스틱 제어
    const joyZone = document.getElementById('joystickZone');
    const joyKnob = document.getElementById('joystickKnob');
    let touchId = null;

    joyZone.addEventListener('touchstart', e => {
        e.preventDefault();
        const touch = e.changedTouches[0];
        touchId = touch.identifier;
        updateJoy(touch);
    });
    joyZone.addEventListener('touchmove', e => {
        e.preventDefault();
        for (let i=0; i<e.changedTouches.length; i++) {
            if (e.changedTouches[i].identifier === touchId) updateJoy(e.changedTouches[i]);
        }
    });
    const resetJoy = (e) => {
        for (let i=0; i<e.changedTouches.length; i++) {
            if (e.changedTouches[i].identifier === touchId) {
                touchId = null; joyX = 0; joyY = 0;
                joyKnob.style.transform = `translate(-50%, -50%)`;
            }
        }
    };
    joyZone.addEventListener('touchend', resetJoy);
    joyZone.addEventListener('touchcancel', resetJoy);

    function updateJoy(touch) {
        const rect = joyZone.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        let dx = touch.clientX - centerX;
        let dy = touch.clientY - centerY;
        const dist = Math.hypot(dx, dy);
        const maxDist = rect.width / 2;
        
        if (dist > maxDist) {
            dx = (dx / dist) * maxDist;
            dy = (dy / dist) * maxDist;
        }
        
        joyKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
        joyX = dx / maxDist;
        joyY = dy / maxDist;
    }

    function updateGame() {
        if (!isRunning) return;

        if (player.alive) {
            let mx = joyX;
            let my = joyY;
            if (keys['ArrowUp'] || keys['w']) my = -1;
            if (keys['ArrowDown'] || keys['s']) my = 1;
            if (keys['ArrowLeft'] || keys['a']) mx = -1;
            if (keys['ArrowRight'] || keys['d']) mx = 1;

            const isMoving = mx !== 0 || my !== 0;
            // 모바일 조이스틱을 끝까지 밀면 대시 발동
            const tryRun = keys['Shift'] || Math.Project !== undefined ? false : Math.hypot(joyX, joyY) > 0.85;

            if (isMoving && tryRun && player.stamina > 0) {
                player.speed = player.runSpeed;
                player.stamina -= 0.4;
                if (player.stamina < 0) player.stamina = 0;
            } else {
                player.speed = player.walkSpeed;
                if (player.stamina < player.maxStamina) {
                    player.stamina += 0.15;
                    if (player.stamina > player.maxStamina) player.stamina = player.maxStamina;
                }
            }

            UI.stamina.style.width = `${(player.stamina / player.maxStamina) * 100}%`;

            if (isMoving) {
                player.x += mx * player.speed;
                player.y += my * player.speed;
                player.angle = Math.atan2(my, mx);
            }
            player.x = Math.max(player.r, Math.min(GAME_WIDTH - player.r, player.x));
            player.y = Math.max(player.r, Math.min(GAME_HEIGHT - player.r, player.y));
        }

        const survivors = [player, ...ais.filter(a => a.alive)].filter(s => s.alive);

        // AI 행동
        ais.filter(a => a.alive).forEach(ai => {
            const distToKiller = getDist(ai, killer);
            let dx = 0, dy = 0;

            if (distToKiller < 180) {
                const angle = getAngle(killer, ai);
                dx = Math.cos(angle) * ai.speed;
                dy = Math.sin(angle) * ai.speed;
                ai.targetGen = null;
            } else {
                if (!ai.targetGen || ai.targetGen.done) {
                    const undoneGens = generators.filter(g => !g.done);
                    if (undoneGens.length > 0) {
                        ai.targetGen = undoneGens[Math.floor(Math.random() * undoneGens.length)];
                    } else if (escapeGate.active) {
                        ai.targetGen = { x: escapeGate.x + escapeGate.w/2, y: escapeGate.y + escapeGate.h/2 };
                    }
                }
                if (ai.targetGen) {
                    const distToGen = getDist(ai, ai.targetGen);
                    if (distToGen > 30) {
                        const angle = getAngle(ai, ai.targetGen);
                        dx = Math.cos(angle) * ai.speed;
                        dy = Math.sin(angle) * ai.speed;
                    }
                }
            }
            ai.x += dx; ai.y += dy;
            if (dx !== 0 || dy !== 0) ai.angle = Math.atan2(dy, dx);
            ai.x = Math.max(ai.r, Math.min(GAME_WIDTH - ai.r, ai.x));
            ai.y = Math.max(ai.r, Math.min(GAME_HEIGHT - ai.r, ai.y));
        });

        // 살인마 AI 추격
        if (survivors.length > 0) {
            let target = survivors[0];
            let minDist = getDist(killer, target);
            survivors.forEach(s => {
                const d = getDist(killer, s);
                if (d < minDist) { minDist = d; target = s; }
            });

            const angle = getAngle(killer, target);
            killer.x += Math.cos(angle) * killer.speed;
            killer.y += Math.sin(angle) * killer.speed;
            killer.angle = angle;

            if (minDist < killer.r + target.r) {
                target.alive = false;
                createParticles(target.x, target.y, target.color);
                if (target === player) {
                    warningAudio.pause();
                    alert('살인마에게 잡혔다. 게임 오버.');
                    location.reload();
                }
            }
        }

        // 발전기 수리
        let doneCount = 0;
        generators.forEach(gen => {
            if (!gen.done) {
                let isRepairing = false;
                survivors.forEach(s => {
                    if (getDist(s, gen) < gen.r + s.r + 10) isRepairing = true;
                });
                
                if (isRepairing) {
                    gen.progress += 0.15;
                    if (Math.random() < 0.15) createParticles(gen.x, gen.y - 20, '#ffcc00', 1);
                    if (gen.progress >= 100) { gen.progress = 100; gen.done = true; }
                }
            }
            if (gen.done) doneCount++;
        });

        UI.count.innerText = doneCount;
        if (doneCount === generators.length) escapeGate.active = true;

        // 공포 오디오 제어
        if (player.alive) {
            const d = getDist(player, killer);
            if (d < 300) {
                const intensity = (300 - d) / 300;
                UI.border.style.boxShadow = `inset 0 0 ${intensity * 60}px rgba(255, 0, 0, ${intensity})`;
                warningAudio.volume = Math.min(1, Math.max(0, intensity));
                
                if (warningAudio.paused) {
                    warningAudio.play().catch(e => console.log(e));
                }
            } else {
                UI.border.style.boxShadow = `none`;
                warningAudio.volume = 0;
            }

            if (escapeGate.active && player.x > escapeGate.x && player.x < escapeGate.x + escapeGate.w && player.y > escapeGate.y && player.y < escapeGate.y + escapeGate.h) {
                warningAudio.pause();
                alert('탈출 성공! 승리했다.');
                location.reload();
            }
        }

        particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life -= 0.05; });
        particles = particles.filter(p => p.life > 0);
    }

    function createParticles(x, y, color, count = 10) {
        for(let i=0; i<count; i++) {
            particles.push({ x, y, color, vx: (Math.random() - 0.5) * 5, vy: (Math.random() - 0.5) * 5, life: 1 });
        }
    }

    function drawSurvivor(ent) {
        if (!ent.alive) return;
        ctx.save(); ctx.translate(ent.x, ent.y); ctx.rotate(ent.angle);
        ctx.fillStyle = ent.color; ctx.beginPath(); ctx.arc(0, 0, ent.r, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke();
        ctx.fillStyle = '#ffdbac'; ctx.beginPath(); ctx.arc(ent.r * 0.3, 0, ent.r * 0.6, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#000'; ctx.lineWidth = 1; ctx.stroke();
        ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(ent.r * 0.5, -3, 2, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(ent.r * 0.5, 3, 2, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
    }

    function drawKiller(ent) {
        ctx.save(); ctx.translate(ent.x, ent.y); ctx.rotate(ent.angle);
        ctx.fillStyle = '#333333'; ctx.beginPath(); ctx.arc(0, 0, ent.r, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#000'; ctx.lineWidth = 3; ctx.stroke();
        ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(ent.r * 0.3, 0, ent.r * 0.6, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#333'; ctx.lineWidth = 1; ctx.stroke();
        ctx.fillStyle = '#ff0033'; ctx.beginPath(); ctx.arc(ent.r * 0.5, -4, 2.5, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(ent.r * 0.5, 4, 2.5, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
    }

    function drawGame() {
        ctx.fillStyle = '#1a1a1a'; ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
        ctx.strokeStyle = '#252525'; ctx.lineWidth = 1;
        for(let i=0; i<GAME_WIDTH; i+=50) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,GAME_HEIGHT); ctx.stroke(); }
        for(let i=0; i<GAME_HEIGHT; i+=50) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(GAME_WIDTH,i); ctx.stroke(); }

        ctx.fillStyle = escapeGate.active ? '#00ffaa' : '#333';
        ctx.fillRect(escapeGate.x, escapeGate.y, escapeGate.w, escapeGate.h);

        generators.forEach(gen => {
            ctx.beginPath(); ctx.arc(gen.x, gen.y, gen.r, 0, Math.PI * 2);
            ctx.fillStyle = gen.done ? '#44ff44' : '#775511'; ctx.fill();
            ctx.strokeStyle = '#111'; ctx.lineWidth = 3; ctx.stroke();
            if (!gen.done && gen.progress > 0) {
                ctx.fillStyle = '#000'; ctx.fillRect(gen.x - 30, gen.y - 45, 60, 8);
                ctx.fillStyle = '#ffcc00'; ctx.fillRect(gen.x - 30, gen.y - 45, (gen.progress / 100) * 60, 8);
            }
        });

        ais.forEach(drawSurvivor);
        if (player.alive) drawSurvivor(player);
        drawKiller(killer);

        particles.forEach(p => {
            ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1;
        });

        if (player.alive) {
            const grad = ctx.createRadialGradient(player.x, player.y, 60, player.x, player.y, 260);
            grad.addColorStop(0, 'rgba(15, 15, 15, 0)');
            grad.addColorStop(1, 'rgba(15, 15, 15, 0.98)');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
        }
    }

    function loop() {
        if (!isRunning) drawSnow(); else { updateGame(); drawGame(); }
        requestAnimationFrame(loop);
    }

    document.getElementById('btnStart').addEventListener('click', () => {
        document.getElementById('startScreen').style.display = 'none';
        document.getElementById('gameScreen').style.display = 'block';
        UI.staminaBox.style.display = 'block';
        
        warningAudio.play().catch(e => console.log(e));

        // 모바일 기기(터치스크린 지원) 판별 후 조이스틱 활성화
        if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
            document.getElementById('joystickZone').style.display = 'block';
        }
        isRunning = true;
    });

    loop();
</script>

</body>
</html>
